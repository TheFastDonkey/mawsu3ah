{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="تصفح الصفحات">
  {% if page_obj.has_previous %}
    <a href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value|urlencode }}&{% endif %}{% endfor %}page={{ page_obj.previous_page_number }}">السابق</a>
  {% else %}
    <span class="pagination__disabled">السابق</span>
  {% endif %}

  <span class="pagination__current">صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }}</span>

  {% if page_obj.has_next %}
    <a href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value|urlencode }}&{% endif %}{% endfor %}page={{ page_obj.next_page_number }}">التالي</a>
  {% else %}
    <span class="pagination__disabled">التالي</span>
  {% endif %}
</nav>
{% endif %}
