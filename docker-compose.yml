version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mawsu3ah-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: mawsu3ah
      POSTGRES_USER: mawsu3ah
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - mawsu3ah_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mawsu3ah -d mawsu3ah"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mawsu3ah-redis
    restart: unless-stopped
    volumes:
      - mawsu3ah_redis_data:/data

  web:
    build: .
    container_name: mawsu3ah-web
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: mawsu3ah.settings.prod
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media

  nginx:
    image: nginx:alpine
    container_name: mawsu3ah-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
      # Mount your SSL certificates. Adjust the host path to your cert directory.
      # The container path /etc/nginx/ssl must match the paths in nginx/nginx.conf.
      # Example for Let's Encrypt: /etc/letsencrypt/live/yourdomain.com:/etc/nginx/ssl:ro
      # Example for custom certs: /path/to/certs:/etc/nginx/ssl:ro
      - /etc/letsencrypt/live/al-kubra.com:/etc/nginx/ssl:ro

volumes:
  mawsu3ah_postgres_data:
  mawsu3ah_redis_data:
  staticfiles:
  media:
